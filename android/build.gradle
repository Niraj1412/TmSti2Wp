// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

ext {
  // Use a local GPL LTS package to avoid GitHub Packages auth during builds.
  ffmpegKitPackage = "full-gpl-lts"
}

allprojects {
  repositories {
    google()
    mavenCentral()
    // Local fallback cache for FFmpegKit artifacts (generated by scripts/setup-ffmpeg-kit-local.ps1).
    maven { url uri("${rootProject.projectDir}/ffmpeg-kit-local") }
    maven {
      url 'https://maven.pkg.github.com/arthenica/ffmpeg-kit'
      credentials {
        username = project.findProperty("gpr.user") ?: System.getenv("GPR_USER")
        password = project.findProperty("gpr.key") ?: System.getenv("GPR_KEY")
      }
    }
    maven {
      url 'https://maven.pkg.github.com/ffmpeg-kit/ffmpeg-kit'
      credentials {
        username = project.findProperty("gpr.user") ?: System.getenv("GPR_USER")
        password = project.findProperty("gpr.key") ?: System.getenv("GPR_KEY")
      }
    }
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
